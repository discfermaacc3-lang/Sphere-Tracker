kind = "web"
previewPath = "/"
title = "Life Dashboard"
version = "1.0.0"
id = "artifacts/life-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24259
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/life-dashboard run dev"

[services.env]
PORT = "24259"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/life-dashboard", "run", "build"]
publicDir = "artifacts/life-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
